<!DOCTYPE html>
<html>
<head>
  <title>ak213chat</title>
</head>

<body>

<h2>💬 ak213chat</h2>

<input id="msg" placeholder="message">
<button onclick="send()">Envoyer</button>

<ul id="messages"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    onSnapshot, 
    query, 
    orderBy 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCnm-v78sVV-T7hLQB0X23CGRw9U-QNJvY",
    authDomain: "ak213ch.firebaseapp.com",
    projectId: "ak213ch",
    storageBucket: "ak213ch.firebasestorage.app",
    messagingSenderId: "252760568506",
    appId: "1:252760568506:web:cddec1e2b65b0c1d140883"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function send(){
    let msg = document.getElementById("msg").value;

    if(msg.trim() === "") return;

    await addDoc(collection(db, "messages"), {
      text: msg,
      time: Date.now()
    });

    document.getElementById("msg").value = "";
  }

  window.send = send;

  const q = query(collection(db, "messages"), orderBy("time"));

  onSnapshot(q, (snapshot) => {
    let list = document.getElementById("messages");
    list.innerHTML = "";

    snapshot.forEach((doc) => {
      let li = document.createElement("li");
      li.innerText = doc.data().text;
      list.appendChild(li);
    });
  });

</script>

</body>
</html>
